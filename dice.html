

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Roller</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        width: 300px;
    }

    h1 {
        margin-bottom: 20px;
        color: #333;
    }

    .dice {
        font-size: 80px;
        margin: 20px 0;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        background: #4facfe;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #008cff;
    }

    #number {
        margin-top: 15px;
        font-size: 24px;
        font-weight: bold;
        color: #444;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🎲 Dice Roller</h1>

    <div class="dice" id="dice">⚀</div>

    <button onclick="rollDice()">Roll Dice</button>

    <div id="number">Number: 1</div>
</div>

<script>
function rollDice() {
    let number = Math.floor(Math.random() * 6) + 1;

    let diceFaces = [
        "⚀",
        "⚁",
        "⚂",
        "⚃",
        "⚄",
        "⚅"
    ];

    document.getElementById("dice").innerHTML = diceFaces[number - 1];
    document.getElementById("number").innerHTML = "Number: " + number;
}
</script>

</body>
</html>
